# Ingress configuration for external traffic routing

apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: self-healing-ingress

  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /

spec:
  rules:
  - host: selfhealing.local

    http:
      paths:
      - path: /
        pathType: Prefix

        backend:
          service:
            name: self-healing-service

            port:
              number: 80
